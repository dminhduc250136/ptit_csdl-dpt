<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBVR — Truy vấn video bằng ảnh</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>CBVR Demo</h1>
    <p class="subtitle">Content-Based Video Retrieval — truy vấn video bằng ảnh tĩnh</p>
    <div class="health" id="health">đang kết nối...</div>
  </header>

  <main>
    <section class="panel-query">
      <h2>1. Tải ảnh truy vấn</h2>

      <label class="dropzone" id="dropzone">
        <input type="file" id="fileInput" accept="image/*" hidden>
        <div class="dz-empty" id="dzEmpty">
          <div class="dz-icon">+</div>
          <div>Kéo thả ảnh hoặc click để chọn</div>
          <div class="dz-hint">JPG, PNG, WEBP</div>
        </div>
        <img class="dz-preview" id="dzPreview" hidden>
      </label>

      <h2>2. Tham số</h2>

      <div class="row">
        <label>Top K
          <input type="number" id="topK" value="10" min="1" max="50">
        </label>
        <label class="checkbox">
          <input type="checkbox" id="byVideo" checked>
          Group theo video
        </label>
      </div>

      <fieldset class="weights">
        <legend>Trọng số nhóm đặc trưng</legend>
        <div class="weight-row">
          <span class="w-label">Color</span>
          <input type="range" id="wColor" min="0" max="1" step="0.05" value="0.0">
          <span class="w-value" id="wColorVal">0.00</span>
        </div>
        <div class="weight-row">
          <span class="w-label">Texture</span>
          <input type="range" id="wTexture" min="0" max="1" step="0.05" value="0.9">
          <span class="w-value" id="wTextureVal">0.90</span>
        </div>
        <div class="weight-row">
          <span class="w-label">Shape</span>
          <input type="range" id="wShape" min="0" max="1" step="0.05" value="0.1">
          <span class="w-value" id="wShapeVal">0.10</span>
        </div>
        <div class="presets">
          <button type="button" data-c="0" data-t="0.9" data-s="0.1">Tuned (0/0.9/0.1)</button>
          <button type="button" data-c="0.35" data-t="0.35" data-s="0.2">Default</button>
          <button type="button" data-c="1" data-t="0" data-s="0">Color</button>
          <button type="button" data-c="0" data-t="1" data-s="0">Texture</button>
          <button type="button" data-c="0" data-t="0" data-s="1">Shape</button>
        </div>
      </fieldset>

      <button class="btn-primary" id="searchBtn" disabled>Tìm kiếm</button>
      <div class="status" id="status"></div>
    </section>

    <section class="panel-results">
      <h2>Kết quả</h2>
      <div id="results" class="results-grid">
        <p class="empty">Tải ảnh và bấm "Tìm kiếm" để bắt đầu.</p>
      </div>
    </section>
  </main>

  <!-- Modal video player -->
  <div class="modal" id="modal" hidden>
    <div class="modal-bg"></div>
    <div class="modal-box">
      <button class="modal-close" id="modalClose">×</button>
      <h3 id="modalTitle"></h3>
      <p id="modalMeta" class="muted"></p>
      <video id="modalVideo" controls></video>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
